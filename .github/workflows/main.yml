name: ginkgo-main_v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # jangan pakai latest biar stabil

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Building Kernel
      env:
        TZ: Asia/Jakarta
      run: |
        chmod +x build.sh
        bash build.sh
